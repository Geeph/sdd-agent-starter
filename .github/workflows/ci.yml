name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Green on an empty scaffold: each job skips when its stack is absent. Once a stack is present,
# all required checks run and fail on error. Node checks both the root app and prototype/.

jobs:
  node:
    name: Node / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ] || [ -f prototype/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No root or prototype/package.json — skipping Node checks."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 20

      - name: Install (deterministic)
        if: steps.detect.outputs.present == 'true'
        run: |
          for dir in . prototype; do
            [ -f "$dir/package.json" ] || continue
            if [ ! -f "$dir/package-lock.json" ] && [ ! -f "$dir/npm-shrinkwrap.json" ]; then
              echo "::error file=$dir/package.json::Commit a lockfile so CI is reproducible."
              exit 1
            fi
            npm --prefix "$dir" ci
          done

      - name: Require scripts to be defined
        if: steps.detect.outputs.present == 'true'
        run: |
          # Root app: all four checks. prototype/ is throwaway for the design gate, so it only
          # needs to build (lint/typecheck/test are not required of it). One node process so the
          # exit code is unambiguous regardless of shell errexit.
          node -e '
            const fs = require("fs");
            const errors = [];
            if (fs.existsSync("package.json")) {
              const s = require("./package.json").scripts || {};
              const missing = ["lint", "typecheck", "test", "build"].filter((n) => !s[n]);
              if (missing.length) errors.push("Root package.json missing required scripts: " + missing.join(", "));
            }
            if (fs.existsSync("prototype/package.json")) {
              const s = require("./prototype/package.json").scripts || {};
              if (!s.build) errors.push("prototype/package.json must define a build script");
            }
            if (errors.length) { errors.forEach((e) => console.error(e)); process.exit(1); }
          '

      - name: Lint (root)
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f package.json ]; then npm run lint; fi

      - name: Typecheck (root)
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f package.json ]; then npm run typecheck; fi

      - name: Test (root)
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f package.json ]; then npm test; fi

      - name: Build (root + prototype)
        if: steps.detect.outputs.present == 'true'
        run: |
          for dir in . prototype; do
            [ -f "$dir/package.json" ] || continue
            npm --prefix "$dir" run build
          done

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python project
        id: detect
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No pyproject.toml / requirements.txt — skipping Python checks (expected for an empty scaffold)."
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.present == 'true'
        with:
          python-version: '3.12'

      - name: Install
        if: steps.detect.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build mypy pytest ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Editable install only when pyproject declares a real package (not just tool config).
          if [ -f pyproject.toml ] && grep -Eq '^\[(build-system|project)\]' pyproject.toml; then
            pip install -e .
          fi

      - name: Lint (ruff)
        if: steps.detect.outputs.present == 'true'
        run: ruff check .

      - name: Typecheck (mypy)
        if: steps.detect.outputs.present == 'true'
        run: mypy .

      - name: Test (pytest)
        if: steps.detect.outputs.present == 'true'
        run: pytest -q

      - name: Build / package validation
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f pyproject.toml ] && grep -Eq '^\[(build-system|project)\]' pyproject.toml; then
            python -m build
          else
            # requirements.txt-only applications have no package artifact to build.
            python -m compileall -q .
          fi
