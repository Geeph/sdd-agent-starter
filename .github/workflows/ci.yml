name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Green on an empty scaffold: each job SKIPS when its stack is absent. But once a stack is
# present, checks run for real and FAIL on error — nothing is swallowed. A present stack that
# defines none of lint/typecheck/test/build fails, so CI can never "check nothing".

jobs:
  node:
    name: Node / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json — skipping Node checks (expected for an empty scaffold)."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 20

      - name: Install (deterministic)
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            echo "No lockfile — using 'npm install'. Commit a lockfile for reproducible CI."
            npm install
          fi

      - name: Require at least one check to be defined
        if: steps.detect.outputs.present == 'true'
        run: |
          node -e '
            const s = (require("./package.json").scripts) || {};
            const want = ["lint", "typecheck", "test", "build"];
            const have = want.filter((k) => s[k]);
            if (have.length === 0) {
              console.error("This Node project defines none of: " + want.join(", ") +
                " — CI would check nothing. Define at least a test or build script (see AGENTS.md).");
              process.exit(1);
            }
            console.log("Checks defined: " + have.join(", "));
          '

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.detect.outputs.present == 'true'
        run: npm run typecheck --if-present

      - name: Test
        if: steps.detect.outputs.present == 'true'
        run: npm test --if-present

      - name: Build
        if: steps.detect.outputs.present == 'true'
        run: npm run build --if-present

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python project
        id: detect
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No pyproject.toml / requirements.txt — skipping Python checks (expected for an empty scaffold)."
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.present == 'true'
        with:
          python-version: '3.12'

      - name: Install
        if: steps.detect.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Editable install only when pyproject declares a real package (not just tool config).
          if [ -f pyproject.toml ] && grep -Eq '^\[(build-system|project)\]' pyproject.toml; then
            pip install -e .
          fi

      - name: Lint (ruff)
        if: steps.detect.outputs.present == 'true'
        run: ruff check .

      - name: Typecheck (mypy, if configured)
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f mypy.ini ] || [ -f .mypy.ini ] || grep -Eqs '^\[tool\.mypy\]' pyproject.toml; then
            pip install mypy
            mypy .
          else
            echo "No mypy config — skipping typecheck. Add [tool.mypy] (or mypy.ini) to enable."
          fi

      - name: Test (pytest)
        if: steps.detect.outputs.present == 'true'
        run: |
          set +e
          pytest -q
          code=$?
          set -e
          # exit 5 = "no tests collected" — allowed only while a project is still being
          # scaffolded. Once you have code, add tests; AGENTS.md requires tests before "done".
          if [ "$code" = "0" ] || [ "$code" = "5" ]; then
            echo "Python tests OK (exit $code)."
            exit 0
          fi
          exit $code
