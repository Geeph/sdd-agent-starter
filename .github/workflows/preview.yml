name: Preview

# Preview deploy for the design/prototype track (Scenario 2/3).
# Builds prototype/ and (on main) publishes it to GitHub Pages — a URL you can open on your
# phone. No secrets required. For per-PR preview URLs, swap the deploy job for Vercel or
# Cloudflare Pages (see README) and add the token via `gh secret set`.
# Skips and stays green until a prototype/ actually exists.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build prototype
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.detect.outputs.present }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect prototype
        id: detect
        run: |
          if [ -f prototype/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No prototype/ — skipping preview (expected until a prototype exists)."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 20

      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: prototype
        run: |
          npm ci || npm install
          npm run build --if-present

      - name: Upload Pages artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          # Adjust to your prototype's build output: dist/ (Vite), out/ (Next export),
          # build/ (CRA), or "prototype" itself for a plain static site.
          path: prototype/dist

  deploy:
    name: Deploy preview (GitHub Pages)
    # Publish only from main; PRs just build above. For per-PR live URLs use Vercel/Cloudflare.
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.present == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
