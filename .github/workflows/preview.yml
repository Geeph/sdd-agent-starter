name: Preview

# OPTIONAL — only for the code-prototype path (agent-generated UI). With Figma-based design,
# the "preview" is just the Figma share link (see AGENTS.md) and you do not need this file.
# When a prototype/ exists, PRs validate its build. After merge, main publishes it to GitHub
# Pages for the design gate. For a pre-merge URL, use Vercel or Cloudflare Pages (see README).
# Skips and stays green until a prototype/ actually exists.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build prototype
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.detect.outputs.present }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect prototype
        id: detect
        run: |
          if [ -f prototype/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No prototype/ — skipping preview (expected; Figma designs need no deploy)."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 20

      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: prototype
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          # Adjust to your prototype's build output: dist/ (Vite), out/ (Next export),
          # build/ (CRA), or "prototype" itself for a plain static site.
          path: prototype/dist

  deploy:
    name: Deploy preview (GitHub Pages)
    # Publish only from main; PRs just build above. For per-PR live URLs use Vercel/Cloudflare.
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.present == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
